name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for release (e.g. v1.1.2)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set version from tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="$(grep versionName app/build.gradle | grep -oP '[\d.]+')+${GITHUB_SHA:0:7}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Sign APK
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASS }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > /tmp/termux-dev.p12
          APK=$(find app/build/outputs/apk -name "*.apk" ! -name "*-signed.apk" | head -1)
          $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools/ | tail -1)/apksigner sign \
            --ks /tmp/termux-dev.p12 \
            --ks-type PKCS12 \
            --ks-pass "pass:$KEYSTORE_PASS" \
            --ks-key-alias "$KEY_ALIAS" \
            --key-pass "pass:$KEY_PASS" \
            --out app/build/outputs/apk/release/termux-nsd-signed.apk \
            "$APK"
          rm /tmp/termux-dev.p12

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: termux-nsd-${{ steps.version.outputs.version }}
          path: app/build/outputs/apk/release/termux-nsd-signed.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || inputs.tag_name != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          files: app/build/outputs/apk/release/termux-nsd-signed.apk
          name: termux-nsd v${{ steps.version.outputs.version }}
          body: |
            ## termux-nsd v${{ steps.version.outputs.version }}

            Android mDNS (DNS-SD) broadcaster via NsdManager.

            **Install:** Download `termux-nsd-signed.apk` and sideload, or track this
            repo in Obtainium (filter: `termux-nsd-signed`).
